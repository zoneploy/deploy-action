name: Zoneploy Deploy
description: Deploy a container or stack to Zoneploy without using a central registry.

inputs:
  api-url:
    description: Zoneploy Cloud API base URL.
    required: false
    default: https://api.zoneploy.com/api/v1
  deploy-token:
    description: Deploy token generated by Zoneploy.
    required: false
  token:
    description: Legacy alias for deploy-token.
    required: false
  target:
    description: Deployment target type. Use auto, container or stack.
    required: false
    default: auto
  checkout:
    description: Checkout the current repository before deploy.
    required: false
    default: "true"
  repository:
    description: Git repository URL cloned by the self-hosted VPS.
    required: false
  ref:
    description: Git branch or tag cloned by the self-hosted VPS.
    required: false
  commit-sha:
    description: Commit SHA checked out after clone.
    required: false
  github-token:
    description: Git token for private repositories. Public repositories can omit it.
    required: false
  context:
    description: Build context path inside the repository.
    required: false
    default: .
  dockerfile:
    description: Dockerfile path relative to the context.
    required: false
    default: Dockerfile
  compose-file:
    description: Compose file path for stack deploys.
    required: false
    default: docker-compose.yml
  image:
    description: Existing external image to deploy without building.
    required: false

outputs:
  deployment-id:
    description: Zoneploy deployment id returned by the API.
    value: ${{ steps.deploy.outputs.deployment-id }}
  deploy-id:
    description: Deploy plan id.
    value: ${{ steps.deploy.outputs.deploy-id }}
  mode:
    description: Deploy mode selected by Zoneploy.
    value: ${{ steps.deploy.outputs.mode }}
  status:
    description: Deployment status returned by the API.
    value: ${{ steps.deploy.outputs.status }}

runs:
  using: composite
  steps:
    - name: Checkout repository
      if: ${{ inputs.checkout == 'true' }}
      uses: actions/checkout@v4
      with:
        persist-credentials: false

    - name: Deploy to Zoneploy
      id: deploy
      shell: bash
      run: node "$GITHUB_ACTION_PATH/index.js"
      env:
        INPUT_API_URL: ${{ inputs.api-url }}
        INPUT_DEPLOY_TOKEN: ${{ inputs.deploy-token }}
        INPUT_TOKEN: ${{ inputs.token }}
        INPUT_TARGET: ${{ inputs.target }}
        INPUT_REPOSITORY: ${{ inputs.repository }}
        INPUT_REF: ${{ inputs.ref }}
        INPUT_COMMIT_SHA: ${{ inputs.commit-sha }}
        INPUT_GITHUB_TOKEN: ${{ inputs.github-token }}
        INPUT_CONTEXT: ${{ inputs.context }}
        INPUT_DOCKERFILE: ${{ inputs.dockerfile }}
        INPUT_COMPOSE_FILE: ${{ inputs.compose-file }}
        INPUT_IMAGE: ${{ inputs.image }}
